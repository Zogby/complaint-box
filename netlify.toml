[build]
command = "pnpm netlify:build"
functions = "dist"
publish = "dist/public"

[functions]
node_bundler = "nft"
included_files = [
  "node_modules/drizzle-orm/**",
  "node_modules/mysql2/**",
  "node_modules/.pnpm/drizzle-orm*/node_modules/drizzle-orm/**",
  "node_modules/.pnpm/mysql2*/node_modules/mysql2/**"
]

[[redirects]]
from = "/api/*"
to = "/.netlify/functions/index/:splat"
status = 200

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[context.production]
environment = { NODE_ENV = "production" }

[dev]
command = "pnpm dev"
port = 3000