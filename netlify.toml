[build]
command = "pnpm netlify:build"
functions = "dist"
publish = "dist/public"

[functions]
node_bundler = "nft"
external_node_modules = [
  "drizzle-orm",
  "mysql2",
  "serverless-http",
  "express",
  "@trpc/server",
  "superjson",
  "cookie",
  "jose",
  "zod"
]
included_files = [
  "node_modules/.pnpm/**/node_modules/drizzle-orm/**",
  "node_modules/.pnpm/**/node_modules/mysql2/**",
  "node_modules/.pnpm/**/node_modules/serverless-http/**",
  "node_modules/.pnpm/**/node_modules/@trpc/server/**",
  "node_modules/.pnpm/**/node_modules/superjson/**",
  "node_modules/.pnpm/**/node_modules/cookie/**",
  "node_modules/.pnpm/**/node_modules/jose/**",
  "node_modules/.pnpm/**/node_modules/zod/**"
]

[[redirects]]
from = "/api/*"
to = "/.netlify/functions/index/:splat"
status = 200

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[context.production]
environment = { NODE_ENV = "production" }

[dev]
command = "pnpm dev"
port = 3000